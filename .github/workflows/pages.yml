# Deploy the static dashboard (docs/) to GitHub Pages.
# GitHub-native actions only (configure-pages + upload-pages-artifact + deploy-pages).
# No third-party deploy action, no build step — docs/ is already a self-contained static site.
name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:        # allow manual runs

# Least-privilege permissions required by GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs          # self-contained static site — no build needed

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
