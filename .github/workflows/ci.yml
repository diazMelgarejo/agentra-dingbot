name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # TA-Lib C library optional — pandas-ta fallback works without it (per README).
          # Skip TA-Lib>=0.4.32 on CI to avoid system dep; install everything else.
          grep -v '^TA-Lib' requirements.txt | pip install -r /dev/stdin
          if [ -f pyproject.toml ]; then python -m pip install -e ".[dev]" 2>/dev/null || python -m pip install -e . 2>/dev/null || true; fi
          # Always install test + lint deps
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing --ignore=tests/live

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml

      - name: Run Ruff (lint)
        run: ruff check src tests

      - name: Run MyPy (type-check)
        run: mypy src --ignore-missing-imports

  security-scan:
    runs-on: ubuntu-latest
    needs: test-and-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: python -m pip install pip-audit safety

      - name: Run pip-audit
        run: pip-audit --json > pip-audit.json || true

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit
          path: pip-audit.json
